# modified from https://github.com/hn-88/OCVWarp/blob/master/.github/workflows/cmake-nix.yml
name: CMake build for Linux

on: workflow_dispatch

env:
  BUILD_TYPE: Release
  #PATH_TO_ARTIFACT: $GITHUB_WORKSPACE/build/nameofexecutable this does not seem to work

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt install glew-utils libpng-dev freeglut3-dev git libxrandr-dev libxinerama-dev xorg-dev libxcursor-dev libcurl4-openssl-dev libxi-dev libasound2-dev libgdal-dev libboost1.74-dev qt6-base-dev libmpv-dev libvulkan-dev
        sudo apt install software-properties-common
        sudo add-apt-repository ppa:ubuntu-toolchain-r/test
        sudo apt install gcc-13 g++-13

    - name: Build
      # Build your program with the given configuration
      run: |
        # use the build steps at https://docs.openspaceproject.com/en/latest/dev/compiling/ubuntu.html
        mkdir build
        cd build
        #
        cmake -DCMAKE_BUILD_TYPE:STRING="Release" -DCMAKE_CXX_COMPILER:FILEPATH=/usr/bin/g++-13 -DCMAKE_C_COMPILER:FILEPATH=/usr/bin/gcc-13 -DASSIMP_BUILD_MINIZIP=1 ..
        make -j
      
    - name: Create appimage
      working-directory: ${{github.workspace}}/build
      # https://appimage-builder.readthedocs.io/en/latest/hosted-services/github-actions.html
      # But instead using linuxdeployqt as in https://github.com/hn-88/OCVWarp/blob/master/.travis.yml
      run: |
        echo "create appimage"
        mkdir -p appdir/usr/bin ; strip openspace ; cp openspace ./appdir/usr/bin/openspace
        mkdir -p appdir/usr/share/applications ; cp ../appdir/openspace.desktop ./appdir/usr/share/applications/
        mkdir -p appdir/usr/share/icons/hicolor/256x256/apps ; cp ../appdir/openspace.png ./appdir/usr/share/icons/hicolor/256x256/apps/
        wget -c -nv "https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage"
        chmod a+x linuxdeployqt-continuous-x86_64.AppImage
        unset QTDIR; unset QT_PLUGIN_PATH ; unset LD_LIBRARY_PATH
        export VERSION=$(git rev-parse --short HEAD) # linuxdeployqt uses this for naming the file
        ./linuxdeployqt-continuous-x86_64.AppImage appdir/usr/share/applications/*.desktop -bundle-non-qt-libs
        ./linuxdeployqt-continuous-x86_64.AppImage appdir/usr/share/applications/*.desktop -appimage
        mv openspace*.AppImage openspace-0.19.2-x86_64.AppImage -v

    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v4
      with:
        # Artifact name
        name: openspace-appimage
        # optional, default is artifact
        # A file, directory or wildcard pattern that describes what to upload
        path: build/openspace*x86_64.AppImage
